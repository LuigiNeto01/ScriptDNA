services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: scriptdna
      POSTGRES_PASSWORD: scriptdna
      POSTGRES_DB: scriptdna
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scriptdna"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://scriptdna:scriptdna@db:5432/scriptdna
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - oauth2_token:/root/.cache/yt-dlp
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://scriptdna:scriptdna@db:5432/scriptdna
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - oauth2_token:/root/.cache/yt-dlp
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2

volumes:
  pgdata:
  oauth2_token:
